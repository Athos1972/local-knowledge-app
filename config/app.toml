
[logging]
log_dir = "logs"
level = "INFO"
log_to_console = true
log_to_file = true
separate_file_per_run = true

[confluence_transform]
input_root = "~/local-knowledge-data/exports/confluence"
output_root = "~/local-knowledge-data/staging/confluence"
manifests_dir = "~/local-knowledge-data/system/confluence_transform"

[publish.confluence]
input_root = "~/local-knowledge-data/staging/confluence"
output_root = "~/local-knowledge-data/domains"
manifests_dir = "~/local-knowledge-data/system/confluence_publish"
mode = "copy"

[publish.confluence.space_map]
"~NBUBEV" = "sap/customers/xyz/projects/zzz/confluence"

[publish.confluence.defaults]
fallback_path = "_unmapped/confluence"
publish_unmapped = true

[ollama]
base_url = "http://localhost:11434"
chat_model = "llama3.1:8b"
embed_model = "nomic-embed-text"

[embeddings]
provider = "ollama"

[anythingllm]
base_url = "http://localhost:3001"
workspace = ""
document_folder = "custom-documents"
timeout_seconds = 30
max_retries = 3
retry_backoff_seconds = 1.0
api_key = ""

[anythingllm.api]
upload_path = "/api/v1/document/upload"
workspace_attach_path_template = "/api/v1/workspace/{workspace}/update-embeddings"
workspace_attach_path_templates = "/api/v1/workspace/{workspace}/update-embeddings,/api/workspace/{workspace}/update-embeddings"
upload_file_field = "file"
upload_folder_field = "folder"
workspace_attach_documents_key = "adds"
workspace_attach_force_key = "reembed"

[anythingllm_ingest]
ingest_dir = "~/local-knowledge-data/ingest"
allowed_extensions = ".md,.txt,.json,.html,.csv"
max_file_size_mb = 20

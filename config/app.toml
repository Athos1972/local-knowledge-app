
[logging]
log_dir = "logs"
level = "DEBUG"
level_stdout = "INFO"
level_file = "DEBUG"
log_to_console = true
log_to_file = true
separate_file_per_run = true

[confluence_transform]
input_root = "~/local-knowledge-data/exports/confluence"
output_root = "~/local-knowledge-data/staging/confluence"
manifests_dir = "~/local-knowledge-data/system/confluence_transform"
minimum_number_of_raw_characters_in_page = 120
minimum_count_characters_confluence_final_page = 200
page_properties_frontmatter_keys = [
  "Auftraggeber",
  "Auftragnehmer",
  "Aufwand",
  "Auslöser",
  "betroffene Einheiten",
  "jira",
  "Komponente",
  "Komplexität",
  "Modul/OFT",
  "Priorität",
  "Prio",
  "Sponsoring",
  "Status",
  "Streamlead",
  "Type",
]

[scraping_transform]
# Default-Input für scripts/run_transform_scraping_exports.py,
# wenn --input-root nicht explizit gesetzt ist.
input_root = "exports/scraping"

# Default-Output für scripts/run_transform_scraping_exports.py,
# wenn --output-root nicht explizit gesetzt ist.
output_root = "staging/transformed"

[publish.confluence]
input_root = "~/local-knowledge-data/staging/confluence"
output_root = "~/local-knowledge-data/domains"
manifests_dir = "~/local-knowledge-data/system/confluence_publish"
mode = "copy"

[publish.confluence.space_map]
"~NBUBEV" = "sap/customers/xyz/projects/zzz/confluence"

[publish.confluence.defaults]
fallback_path = "_unmapped/confluence"
publish_unmapped = true

[ollama]
base_url = "http://localhost:11434"
chat_model = "llama3.1:8b"
embed_model = "nomic-embed-text"

[embeddings]
provider = "ollama"

[terminology]
reports_dir = "reports"

[terminology.files]
settings = "settings_local.yml"
sources = "sources_local.yml"
terms = "terms_local.yml"

[documents_transform]
input_root = "~/local-knowledge-data/exports/documents"
output_root = "~/local-knowledge-data/staging/documents"
publish_root = "~/local-knowledge-data/ingest/domains"
manifests_dir = "~/local-knowledge-data/system/documents_transform"
fallback_domain = "misc_documents"

[[documents_transform.mapping]]
match = "sharepoint/*/projektmanagement/**"
domain = "project_management"

[[documents_transform.mapping]]
match = "sharepoint/*/architektur/**"
domain = "architecture"

[[documents_transform.mapping]]
match = "book/arisca/**"
domain = "arisca"

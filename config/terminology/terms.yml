# Demo-/Dokudatei fuer den zentralen Terminologie-Bestand.
# Echte lokale Begriffe koennen in `terms_local.yml` gepflegt und per
# `config/local.toml` aktiviert werden.
#
# Wichtige Felder pro Term:
# - `id`: stabile interne Kennung fuer Relationen.
# - `canonical`: Schreibweise fuer Matching und Normalisierung.
# - `label`: lesbarer Titel im Terminology-Block.
# - `description`: kurze fachliche Erklaerung.
# - `term_class`: freie Klassifikation, z. B. `system`, `process`, `person`.
# - `aliases`: alternative Schreibweisen oder Abkuerzungen.
# - `relations`: Beziehungen zu anderen Terms, z. B. `related_to`.
# - `applies_to`: Liste der Source-Types, in denen der Term gilt.
# - `annotate_policy`: z. B. `first_occurrence` oder `never`.
# - `block_policy`: z. B. `include` oder `exclude`.
# - `case_sensitive`: ueberschreibt das globale Matching-Verhalten fuer diesen Term.
# - `priority`: steuert die Reihenfolge bzw. Konfliktaufloesung bei Treffern.

terms:
  - id: Franzi
    canonical: Franzi
    label: Franzi's Label
    description: Das ist der Franzi
    term_class: process
    aliases: []
    relations: []
    applies_to:
      - confluence
      - jira
      - mail
      - teams
    annotate_policy: first_occurrence
    block_policy: include
    case_sensitive: false
    priority: 20

  - id: isu
    canonical: ISU
    label: SAP Industry Solution Utilities
    description: Utilities-spezifische SAP-Lösung.
    term_class: system
    aliases:
      - IS-U
    relations: []
    applies_to:
      - confluence
      - jira
      - mail
      - teams
    annotate_policy: first_occurrence
    block_policy: include
    case_sensitive: false
    priority: 10

  - id: maxmueller
    canonical: MM
    label: Max Mueller
    description: Beispiel-Personenkuerzel, in V1 ohne In-Text-Annotation.
    term_class: person
    aliases:
      - M. Mueller
    relations:
      - type: abbreviation_of
        target_term_id: maxmueller_name
    applies_to:
      - confluence
      - jira
    annotate_policy: never
    block_policy: exclude
    case_sensitive: false
    priority: 90

  - id: maxmueller_name
    canonical: Max Mueller
    label: Max Mueller
    description: Vollstaendiger Personenname fuer relationale Zuordnung.
    term_class: person
    aliases: []
    relations: []
    applies_to:
      - confluence
      - jira
    annotate_policy: never
    block_policy: exclude
    case_sensitive: false
    priority: 91
